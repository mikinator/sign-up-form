<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="img-side">
            <div class="img-container">
                <img src="img/odin-lined.png" alt="odin icon" class="odin-img">
                <span class="odin-text">Odin</span>
            </div>
            <div class="photo-attr">
                Photo by <a
                    href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie
                    West</a> on <a
                    href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
            </div>
        </div>
        <div class="signup-side">
            <div class="section-one">
                <p class="first-para">
                    This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. <br>Sign up <span class="know">now</span> to get started.
                </p>
                <p class="second-para">
                    You <span class="know">know</span> you want to
                </p>
            </div>
            <div class="form-side">
                <h2>Let's do this!</h2>
                <div class="row-one">
                    <div class="row-i">
                        <label for="fname">FIRST NAME</label>
                        <input type="text" id="fname">
                    </div>
                    <div class="row-i">
                        <label for="lname">LAST NAME</label>
                        <input type="text" id="lname">
                    </div>
                </div>
                <div class="row-two">
                    <div class="row-i">
                        <label for="mail">EMAIL</label>
                        <input type="email" id="mail">
                    </div>
                    <div class="row-i">
                        <label for="tel">PHONE NUMBER</label>
                        <input type="tel" id="tel">
                    </div>
                </div>
                <div class="row-three">
                    <div class="row-i">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password">
                    </div>
                    <div class="row-i">
                        <label for="cpass">CONFIRM PASSWORD</label>
                        <input type="password" id="cpass">
                    </div>
                </div>
            </div>
            <div class="submit-side">
                <button type="submit">Create Account</button>
                <p>
                    Already have an account? <a class="login" href="#">Log in</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
